<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ConnectX – Search</title>
  <link rel="stylesheet" href="style.css"/>
  <style>
    .search-page {
      padding-top: 80px;
      max-width: 600px;
      margin: 0 auto;
      padding-left: 16px;
      padding-right: 16px;
    }

    /* Search Bar */
    .search-bar-wrapper {
      position: relative;
      margin-bottom: 24px;
    }

    .search-icon {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 18px;
      color: var(--text-sub);
    }

    .search-bar {
      width: 100%;
      padding: 14px 16px 14px 46px;
      border-radius: 16px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      font-size: 15px;
      outline: none;
      transition: border 0.2s, box-shadow 0.2s;
    }

    .search-bar:focus {
      border-color: var(--violet);
      box-shadow: 0 0 0 3px rgba(108,99,255,0.15);
    }

    /* Section Title */
    .section-title {
      font-size: 11px;
      font-weight: 700;
      color: var(--text-sub);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 14px;
    }

    /* User Card */
    .user-card {
      background: var(--surface);
      border-radius: 16px;
      padding: 14px 16px;
      margin-bottom: 10px;
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 14px;
      transition: border-color 0.2s, transform 0.1s;
    }

    .user-card:hover {
      border-color: var(--violet);
      transform: translateY(-1px);
    }

    .user-avatar {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background: linear-gradient(135deg, #6C63FF, #00D4AA);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-weight: 800;
      color: #fff;
      flex-shrink: 0;
    }

    .user-avatar img {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
    }

    .user-info { flex: 1; }

    .user-name {
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 2px;
    }

    .user-username {
      font-size: 13px;
      color: var(--text-sub);
    }

    .user-bio {
      font-size: 12px;
      color: var(--text-sub);
      margin-top: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 200px;
    }

    /* Follow Button */
    .follow-btn {
      padding: 8px 18px;
      border-radius: 10px;
      border: none;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      flex-shrink: 0;
    }

    .follow-btn.follow {
      background: var(--violet);
      color: #fff;
    }

    .follow-btn.follow:hover { background: var(--violet-dark); }

    .follow-btn.following {
      background: transparent;
      color: var(--text-sub);
      border: 1px solid var(--border);
    }

    .follow-btn.following:hover {
      background: rgba(255,82,82,0.1);
      color: var(--error);
      border-color: var(--error);
    }

    .follow-btn.me {
      background: transparent;
      color: var(--text-sub);
      border: 1px solid var(--border);
      cursor: default;
    }

    /* Empty / Loading */
    .search-empty {
      text-align: center;
      padding: 50px 20px;
      color: var(--text-sub);
    }

    .search-empty .icon { font-size: 44px; margin-bottom: 12px; }
    .search-empty p { font-size: 14px; }
  </style>
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
    <div class="nav-logo">ConnectX</div>
    <div class="nav-actions">
      <a href="feed.html" style="color:var(--text-sub);font-size:13px;font-weight:600;margin-right:8px;">🏠 Feed</a>
      <a href="profile.html" style="color:var(--text-sub);font-size:13px;font-weight:600;margin-right:8px;">👤 Profile</a>
      <button class="nav-btn" onclick="logout()">Logout</button>
    </div>
  </nav>

  <div class="search-page">

    <!-- Search Bar -->
    <div class="search-bar-wrapper">
      <span class="search-icon">🔍</span>
      <input
        class="search-bar"
        id="searchInput"
        type="text"
        placeholder="Search users by username..."
        oninput="handleSearch()"
      />
    </div>

    <!-- Results -->
    <div class="section-title" id="resultsTitle">👥 All Users</div>
    <div id="usersList">
      <div class="loader">Loading users...</div>
    </div>

  </div>

  <script type="module">
    import { supabase } from './supabase.js'

    let currentUser  = null
    let allUsers     = []
    let followingIds = new Set()

    // ---- Init ----
    async function init() {
      const { data: { session } } = await supabase.auth.getSession()
      if (!session) { window.location.href = 'index.html'; return }
      currentUser = session.user

      await loadFollowing()
      await loadAllUsers()
    }

    // ---- Load who I follow ----
    async function loadFollowing() {
      const { data } = await supabase
        .from('follows')
        .select('following_id')
        .eq('follower_id', currentUser.id)

      followingIds = new Set((data || []).map(f => f.following_id))
    }

    // ---- Load All Users ----
    async function loadAllUsers() {
      const { data, error } = await supabase
        .from('profiles')
        .select('id, username, full_name, bio, avatar_url')
        .order('created_at', { ascending: false })

      if (error) {
        document.getElementById('usersList').innerHTML =
          '<div class="loader">Error loading users.</div>'
        return
      }

      allUsers = data || []
      renderUsers(allUsers)
    }

    // ---- Handle Search ----
    window.handleSearch = function () {
      const query = document.getElementById('searchInput').value.trim().toLowerCase()
      const titleEl = document.getElementById('resultsTitle')

      if (!query) {
        titleEl.textContent = '👥 All Users'
        renderUsers(allUsers)
        return
      }

      const filtered = allUsers.filter(u =>
        u.username?.toLowerCase().includes(query) ||
        u.full_name?.toLowerCase().includes(query)
      )

      titleEl.textContent = `🔍 Results for "${query}"`
      renderUsers(filtered)
    }

    // ---- Render Users ----
    function renderUsers(users) {
      const listEl = document.getElementById('usersList')

      const others = users.filter(u => u.id !== currentUser.id)

      if (others.length === 0) {
        listEl.innerHTML = `
          <div class="search-empty">
            <div class="icon">🔍</div>
            <p>No users found</p>
          </div>`
        return
      }

      listEl.innerHTML = others.map(user => {
        const initial   = (user.username || 'U')[0].toUpperCase()
        const isFollowing = followingIds.has(user.id)
        const avatarHtml = user.avatar_url
          ? `<img src="${user.avatar_url}" alt="avatar"/>`
          : initial

        return `
          <div class="user-card" id="ucard-${user.id}">
            <div class="user-avatar">${avatarHtml}</div>
            <div class="user-info">
              <div class="user-name">${user.full_name || user.username}</div>
              <div class="user-username">@${user.username}</div>
              ${user.bio ? `<div class="user-bio">${user.bio}</div>` : ''}
            </div>
            <button
              class="follow-btn ${isFollowing ? 'following' : 'follow'}"
              id="fbtn-${user.id}"
              onclick="toggleFollow('${user.id}')"
            >
              ${isFollowing ? 'Following' : 'Follow'}
            </button>
          </div>`
      }).join('')
    }

    // ---- Toggle Follow ----
    window.toggleFollow = async function (userId) {
      const btn        = document.getElementById(`fbtn-${userId}`)
      const isFollowing = followingIds.has(userId)

      // Optimistic UI
      if (isFollowing) {
        followingIds.delete(userId)
        btn.textContent = 'Follow'
        btn.className   = 'follow-btn follow'

        await supabase.from('follows')
          .delete()
          .eq('follower_id', currentUser.id)
          .eq('following_id', userId)
      } else {
        followingIds.add(userId)
        btn.textContent = 'Following'
        btn.className   = 'follow-btn following'

        await supabase.from('follows').insert({
          follower_id:  currentUser.id,
          following_id: userId
        })
      }
    }

    window.logout = async function () {
      await supabase.auth.signOut()
      window.location.href = 'index.html'
    }

    init()
  </script>

</body>
</html>
