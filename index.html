  <link rel="stylesheet" href="style.css"/>

  <style>
    /* Extra login page polish */
    .auth-page {
      background: #000;
    }
    .auth-card {
      animation: fadeUp 0.4s ease;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .logo {
      background: linear-gradient(135deg, #6C63FF, #00D4AA);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .features-row {
      display: flex;
      justify-content: center;
      gap: 16px;
      flex-wrap: wrap;
      margin: 20px 0 8px;
    }
    .feature-chip {
      font-size: 11px;
      color: var(--text-sub);
      background: var(--card);
      padding: 5px 10px;
      border-radius: 20px;
      border: 1px solid var(--border);
    }
    .divider {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 16px 0;
      color: var(--text-sub);
      font-size: 12px;
    }
    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }
    .password-wrapper {
      position: relative;
    }
    .password-wrapper input {
      padding-right: 44px;
    }
    .toggle-pw {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      font-size: 16px;
      color: var(--text-sub);
      padding: 4px;
    }
    .toggle-pw:hover { color: var(--text); }
    .forgot-link {
      display: block;
      text-align: right;
      font-size: 12px;
      color: var(--violet);
      margin-top: 4px;
      cursor: pointer;
    }
    .forgot-link:hover { color: var(--teal); }
  </style>
</head>
<body>
  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <div class="auth-page">
    <div class="auth-card">
      <div class="logo">ConnectX</div>
      <div class="tagline">Connect Beyond Limits</div>

      <div class="features-row">
        <span class="feature-chip">💬 Messaging</span>
        <span class="feature-chip">🎬 Reels</span>
        <span class="feature-chip">🔴 Live</span>
        <span class="feature-chip">📸 Stories</span>
      </div>

      <div class="divider">Log in to your account</div>

      <div class="input-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="you@example.com" autocomplete="email"/>
      </div>

      <div class="input-group">
        <label>Password</label>
        <div class="password-wrapper">
          <input type="password" id="password" placeholder="••••••••" autocomplete="current-password"/>
          <button class="toggle-pw" type="button" onclick="togglePassword()" id="togglePwBtn">👁</button>
        </div>
        <span class="forgot-link" onclick="forgotPassword()">Forgot password?</span>
      </div>

      <button class="btn btn-primary" onclick="login()" id="loginBtn">Log In</button>

      <div id="msg" class="msg"></div>

      <div class="switch-text">
        Don't have an account? <a href="signup.html">Sign Up</a>
      </div>
    </div>
  </div>

  <script type="module">
    import { supabase } from './supabase.js'

    // Register service worker
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js').catch(() => {})
    }

    // Auto-redirect if already logged in
    supabase.auth.getSession().then(({ data: { session } }) => {
      if (session) window.location.href = 'feed.html'
    })

    // Toggle password visibility
    window.togglePassword = function() {
      const pw = document.getElementById('password')
      const btn = document.getElementById('togglePwBtn')
      if (pw.type === 'password') {
        pw.type = 'text'
        btn.textContent = '🙈'
      } else {
        pw.type = 'password'
        btn.textContent = '👁'
      }
    }

    // Login
    window.login = async function() {
      const email    = document.getElementById('email').value.trim()
      const password = document.getElementById('password').value
      const msg      = document.getElementById('msg')
      const btn      = document.getElementById('loginBtn')

      msg.className  = 'msg'
      msg.textContent = ''

      if (!email || !password) {
        msg.className = 'msg error'
        msg.textContent = 'Please fill in all fields.'
        return
      }

      btn.textContent = 'Logging in...'
      btn.disabled = true

      const { error } = await supabase.auth.signInWithPassword({ email, password })

      if (error) {
        msg.className = 'msg error'
        msg.textContent = error.message
        btn.textContent = 'Log In'
        btn.disabled = false
      } else {
        msg.className = 'msg success'
        msg.textContent = '✅ Logged in! Redirecting...'
        setTimeout(() => window.location.href = 'feed.html', 800)
      }
    }

    // Forgot password
    window.forgotPassword = async function() {
      const email = document.getElementById('email').value.trim()
      const msg   = document.getElementById('msg')

      if (!email) {
        msg.className = 'msg error'
        msg.textContent = 'Enter your email above first.'
        return
      }

      const { error } = await supabase.auth.resetPasswordForEmail(email, {
        redirectTo: 'https://connectx-psi.vercel.app/reset-password.html'
      })

      if (error) {
        msg.className = 'msg error'
        msg.textContent = error.message
      } else {
        msg.className = 'msg success'
        msg.textContent = '📧 Password reset email sent! Check your inbox.'
      }
    }

    // Allow Enter key to submit
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') login()
    })
  </script>
</body>
