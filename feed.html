<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>ConnectX – Feed</title>
  <link rel="manifest" href="manifest.json"/>
<meta name="theme-color" content="#6C63FF"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
  <link rel="stylesheet" href="style.css"/>
  <style>
    .stories-bar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 14px 16px;
      overflow-x: auto;
      scrollbar-width: none;
      display: flex;
      gap: 14px;
      min-height: 100px;
      align-items: center;
      width: 100%;
      box-sizing: border-box;
    }
    .stories-bar::-webkit-scrollbar { display: none; }

    .story-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      flex-shrink: 0;
      min-width: 64px;
    }

    .story-ring {
      width: 64px; 
      height: 64px;
      border-radius: 50%;
      padding: 3px;
      background: linear-gradient(135deg, #6C63FF, #00D4AA, #FF6584);
      position: relative;
      transition: transform 0.2s;
      flex-shrink: 0;
    }

    .story-ring:hover { transform: scale(1.08); }
    .story-ring.seen  { background: var(--border); }

    .story-ring-inner {
      width: 100%; 
      height: 100%;
      border-radius: 50%;
      overflow: hidden;
      border: 3px solid var(--surface);
      background: var(--card);
      display: flex; 
      align-items: center; 
      justify-content: center;
      font-size: 22px; 
      font-weight: 800; 
      color: #fff;
    }

    .story-ring-inner img { width: 100%; height: 100%; object-fit: cover; }

    .add-story-btn {
      position: absolute;
      bottom: 0; right: 0;
      width: 22px; height: 22px;
      background: var(--violet);
      border-radius: 50%;
      border: 2px solid var(--surface);
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; color: #fff; font-weight: 700;
    }

    .story-username {
      font-size: 11px; 
      color: var(--text-sub);
      max-width: 64px; 
      text-align: center;
      overflow: hidden; 
      text-overflow: ellipsis; 
      white-space: nowrap;
    }

    .story-viewer {
      position: fixed; inset: 0;
      background: #000;
      z-index: 1000;
      display: none;
      flex-direction: column;
    }
    .story-viewer.open { display: flex; }

    .story-progress-bar {
      display: flex; gap: 4px;
      padding: 12px 12px 0;
      position: absolute;
      top: 0; left: 0; right: 0;
      z-index: 10;
    }

    .progress-segment {
      flex: 1; height: 3px;
      background: rgba(255,255,255,0.35);
      border-radius: 2px; overflow: hidden;
    }

    .progress-fill {
      height: 100%; background: #fff;
      width: 0%; transition: width linear;
    }

    .story-header {
      position: absolute;
      top: 24px; left: 0; right: 0;
      padding: 10px 16px;
      display: flex; align-items: center; gap: 10px;
      z-index: 10;
    }

    .story-header-avatar {
      width: 38px; height: 38px;
      border-radius: 50%;
      border: 2px solid #fff;
      overflow: hidden;
      background: var(--violet);
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; color: #fff;
    }

    .story-header-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .story-header-info { flex: 1; }
    .story-header-name { font-size: 14px; font-weight: 700; color: #fff; }
    .story-header-time { font-size: 11px; color: rgba(255,255,255,0.7); }

    .story-close-btn {
      background: none; border: none;
      color: #fff; font-size: 24px;
      cursor: pointer; padding: 4px;
    }

    .story-media {
      flex: 1;
      display: flex; align-items: center; justify-content: center;
      position: relative;
    }

    .story-media img { max-width: 100%; max-height: 100%; object-fit: contain; }

    .story-caption {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: 60px 20px 20px;
      background: linear-gradient(transparent, rgba(0,0,0,0.8));
      color: #fff; font-size: 16px; text-align: center;
    }

    .story-nav {
      position: absolute; top: 0; bottom: 0;
      width: 40%; cursor: pointer;
    }
    .story-nav.prev { left: 0; }
    .story-nav.next { right: 0; }

    .story-views {
      position: absolute;
      bottom: 70px; left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.5);
      color: #fff; padding: 6px 14px;
      border-radius: 20px; font-size: 13px;
      backdrop-filter: blur(4px);
    }

    .comments-section {
      border-top: 1px solid var(--border);
      margin-top: 12px; padding-top: 12px;
      display: none;
    }
    .comments-section.open { display: block; }

    .comment-item {
      display: flex; gap: 10px;
      margin-bottom: 12px; align-items: flex-start;
    }

    .comment-avatar {
      width: 32px; height: 32px; border-radius: 50%;
      background: linear-gradient(135deg, #6C63FF, #00D4AA);
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 700; color: #fff; flex-shrink: 0;
    }

    .comment-bubble {
      background: var(--card);
      border-radius: 12px;
      padding: 8px 12px; flex: 1;
    }

    .comment-username { font-size: 12px; font-weight: 700; color: var(--violet); margin-bottom: 2px; }
    .comment-text    { font-size: 13px; color: var(--text); line-height: 1.5; }
    .comment-time    { font-size: 11px; color: var(--text-sub); margin-top: 4px; }

    .comment-input-row { display: flex; gap: 8px; margin-top: 8px; align-items: center; }

    .comment-input {
      flex: 1; background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px; color: var(--text);
      font-size: 13px; padding: 8px 14px;
      outline: none; transition: border 0.2s;
    }
    .comment-input:focus { border-color: var(--violet); }

    .comment-send {
      background: var(--violet); border: none;
      border-radius: 50%; width: 34px; height: 34px;
      color: #fff; font-size: 15px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s, transform 0.1s; flex-shrink: 0;
    }
    .comment-send:hover  { background: var(--violet-dark); }
    .comment-send:active { transform: scale(0.9); }
    .no-comments { font-size: 12px; color: var(--text-sub); text-align: center; padding: 8px 0; }

    .post-footer { display: flex; gap: 8px; align-items: center; }

    .action-btn {
      background: none; border: none; color: var(--text-sub);
      font-size: 13px; cursor: pointer;
      display: flex; align-items: center; gap: 5px;
      padding: 7px 12px; border-radius: 10px;
      transition: background 0.2s, color 0.2s; font-weight: 500;
    }
    .action-btn:hover      { background: var(--elevated); }
    .like-btn:hover        { color: var(--coral); }
    .like-btn.liked        { color: var(--coral); }
    .comment-toggle:hover  { color: var(--violet); }
    .comment-toggle.active { color: var(--violet); }

    .notif-bell {
      position: relative; cursor: pointer;
      font-size: 20px; margin-right: 4px;
    }

    .notif-badge {
      position: absolute; top: -6px; right: -6px;
      background: var(--coral); color: #fff;
      font-size: 10px; font-weight: 700;
      border-radius: 50%; width: 18px; height: 18px;
      display: none; align-items: center; justify-content: center;
    }
    .notif-badge.show { display: flex; }

    .notif-dropdown {
      position: absolute; top: 60px; right: 80px;
      width: 320px; background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      z-index: 200; display: none; overflow: hidden;
    }
    .notif-dropdown.open { display: block; }

    .notif-header {
      padding: 14px 16px; font-size: 14px; font-weight: 700;
      border-bottom: 1px solid var(--border);
      display: flex; justify-content: space-between; align-items: center;
    }

    .mark-read-btn {
      font-size: 11px; color: var(--violet);
      background: none; border: none; cursor: pointer; font-weight: 600;
    }

    .notif-list { max-height: 320px; overflow-y: auto; }

    .notif-item {
      padding: 12px 16px; border-bottom: 1px solid var(--border);
      display: flex; gap: 10px; align-items: flex-start;
      transition: background 0.2s;
    }
    .notif-item:hover  { background: var(--elevated); }
    .notif-item.unread { background: rgba(108,99,255,0.08); }
    .notif-item:last-child { border-bottom: none; }

    .notif-avatar {
      width: 36px; height: 36px; border-radius: 50%;
      background: linear-gradient(135deg, #6C63FF, #00D4AA);
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 700; color: #fff; flex-shrink: 0;
    }
    .notif-text  { font-size: 13px; color: var(--text); line-height: 1.5; }
    .notif-text span { font-weight: 700; color: var(--violet); }
    .notif-time  { font-size: 11px; color: var(--text-sub); margin-top: 3px; }
    .notif-empty { padding: 30px; text-align: center; color: var(--text-sub); font-size: 13px; }

    .story-upload-modal {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.8);
      z-index: 500;
      display: none; align-items: center; justify-content: center;
      backdrop-filter: blur(6px);
    }
    .story-upload-modal.open { display: flex; }

    .story-upload-card {
      background: var(--surface);
      border-radius: 20px;
      padding: 28px 24px;
      width: 100%; max-width: 400px;
      border: 1px solid var(--border);
      animation: slideUp 0.25s ease;
    }

    @keyframes slideUp {
      from { transform: translateY(20px); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }

    .story-preview {
      width: 100%; height: 220px;
      border-radius: 14px; overflow: hidden;
      background: var(--card);
      margin-bottom: 14px;
      display: flex; align-items: center; justify-content: center;
      color: var(--text-sub); font-size: 14px;
      cursor: pointer;
      border: 2px dashed var(--border);
      transition: border-color 0.2s;
    }
    .story-preview:hover { border-color: var(--violet); }
    .story-preview img   { width: 100%; height: 100%; object-fit: cover; }

    .toast {
      position: fixed; bottom: 24px; left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--elevated); color: var(--text);
      padding: 12px 24px; border-radius: 12px;
      font-size: 14px; font-weight: 600;
      border: 1px solid var(--border);
      transition: transform 0.3s ease;
      z-index: 9999;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }

    /* ===== MOBILE FIXES ===== */
    @media screen and (max-width: 768px) {
      .stories-bar {
        padding: 12px 12px;
        gap: 10px;
        min-height: 90px;
        align-items: center;
      }
      
      .story-ring {
        width: 56px;
        height: 56px;
      }
      
      .story-username {
        font-size: 10px;
        max-width: 56px;
      }
      
      .story-item {
        min-width: 56px;
      }
      
      .feed-page {
        padding-top: 70px;
        padding-left: 12px;
        padding-right: 12px;
      }
      
      .post-card {
        padding: 12px;
        border-radius: 12px;
      }
      
      .create-post {
        padding: 12px;
        border-radius: 12px;
      }
      
      .create-post textarea {
        min-height: 60px;
        font-size: 13px;
        padding: 10px;
      }
    }

    @media screen and (max-width: 480px) {
      .stories-bar {
        padding: 10px 10px;
        gap: 8px;
        min-height: 80px;
      }
      
      .story-ring {
        width: 48px;
        height: 48px;
      }
      
      .story-ring-inner {
        font-size: 16px;
      }
      
      .story-username {
        font-size: 9px;
        max-width: 48px;
      }
      
      .story-item {
        min-width: 48px;
      }
      
      .feed-page {
        padding-top: 65px;
        padding-left: 8px;
        padding-right: 8px;
      }
      
      .post-header .avatar {
        width: 32px;
        height: 32px;
        font-size: 12px;
      }
      
      .post-username {
        font-size: 13px;
      }
      
      .post-text {
        font-size: 13px;
      }
      
      .action-btn {
        font-size: 12px;
        padding: 5px 8px;
      }
    }
  </style>
</head>
<body>

  <nav class="navbar">
    <div class="nav-logo">ConnectX</div>
    <div class="nav-actions">
      <span id="nav-username" style="color:#8A8A9A;font-size:14px;"></span>
      <a href="messages.html" style="color:var(--text-sub);font-size:13px;font-weight:600;margin-right:8px;">💬 Messages</a>
      <a href="reels.html" style="color:var(--text-sub);font-size:13px;font-weight:600;margin-right:8px;">🎬 Reels</a>
      <a href="search.html"   style="color:var(--text-sub);font-size:13px;font-weight:600;margin-right:8px;">🔍 Search</a>
      <a href="profile.html"  style="color:var(--text-sub);font-size:13px;font-weight:600;margin-right:8px;">👤 Profile</a>
      <div class="notif-bell" onclick="toggleNotifDropdown()">
        🔔
        <div class="notif-badge" id="notifBadge">0</div>
      </div>
      <button class="nav-btn" onclick="logout()">Logout</button>
    </div>
  </nav>

  <div class="notif-dropdown" id="notifDropdown">
    <div class="notif-header">
      🔔 Notifications
      <button class="mark-read-btn" onclick="markAllRead()">Mark all read</button>
    </div>
    <div class="notif-list" id="notifList">
      <div class="notif-empty">No notifications yet</div>
    </div>
  </div>

  <div class="stories-bar" id="storiesBar">
    <div class="story-item" onclick="openStoryUpload()">
      <div class="story-ring" id="myStoryRing">
        <div class="story-ring-inner" id="myStoryAvatar">+</div>
        <div class="add-story-btn">+</div>
      </div>
      <span class="story-username">Your Story</span>
    </div>
  </div>

  <div class="story-viewer" id="storyViewer">
    <div class="story-progress-bar" id="storyProgressBar"></div>
    <div class="story-header">
      <div class="story-header-avatar" id="viewerAvatar">?</div>
      <div class="story-header-info">
        <div class="story-header-name" id="viewerName"></div>
        <div class="story-header-time" id="viewerTime"></div>
      </div>
      <button class="story-close-btn" onclick="closeStoryViewer()">✕</button>
    </div>
    <div class="story-media">
      <div class="story-nav prev" onclick="prevStory()"></div>
      <img id="storyMediaImg" src="" alt="story"/>
      <div class="story-nav next" onclick="nextStory()"></div>
      <div class="story-views" id="storyViews">👁 0 views</div>
    </div>
    <div class="story-caption" id="storyCaption"></div>
  </div>

  <div class="story-upload-modal" id="storyUploadModal">
    <div class="story-upload-card">
      <div style="font-size:18px;font-weight:700;margin-bottom:16px;">✨ Add Story</div>
      <div class="story-preview" id="storyPreview" onclick="document.getElementById('story-file').click()">
        📷 Click to choose photo
      </div>
      <input type="file" id="story-file" accept="image/*" style="display:none" onchange="previewStory(event)"/>
      <div class="input-group">
        <label>Caption (optional)</label>
        <input type="text" id="story-caption-input" placeholder="Add a caption..."/>
      </div>
      <div style="display:flex;gap:10px;margin-top:16px;">
        <button onclick="closeStoryUpload()" style="flex:1;padding:12px;border-radius:12px;border:1px solid var(--border);background:transparent;color:var(--text-sub);font-weight:600;cursor:pointer;">Cancel</button>
        <button onclick="uploadStory()" style="flex:2;padding:12px;border-radius:12px;border:none;background:var(--violet);color:#fff;font-weight:700;cursor:pointer;font-size:14px;">Share Story ✨</button>
      </div>
    </div>
  </div>

  <div class="feed-page">
    <div class="create-post">
      <textarea id="post-text" placeholder="What's on your mind?"></textarea>
      <div class="post-actions">
        <label class="img-label" for="post-img">📷 Add Photo</label>
        <input type="file" id="post-img" accept="image/*" style="display:none"/>
        <button class="post-btn" onclick="createPost()">Post</button>
      </div>
      <div id="post-msg" class="msg"></div>
    </div>
    <div id="feed"><div class="loader">Loading posts...</div></div>
  </div>

  <div class="toast" id="toast"></div>

  <script type="module">
    import { supabase } from './supabase.js'

    let currentUser    = null
    let currentProfile = null
    let allStories     = []
    let currentStoryGroupIndex = 0
    let currentStoryIndex      = 0
    let storyTimer = null

    async function init() {
      const { data: { session } } = await supabase.auth.getSession()
      if (!session) { window.location.href = 'index.html'; return }
      currentUser = session.user

      const { data } = await supabase
        .from('profiles').select('username, avatar_url')
        .eq('id', currentUser.id).single()

      currentProfile = data
      document.getElementById('nav-username').textContent = '@' + (data?.username || '')

      const myAvatar = document.getElementById('myStoryAvatar')
      if (data?.avatar_url) {
        myAvatar.innerHTML = `<img src="${data.avatar_url}" alt="me"/>`
      } else {
        myAvatar.textContent = (data?.username || 'U')[0].toUpperCase()
      }

      loadFeed()
      loadStories()
      loadNotifications()

      supabase.channel('notifications')
        .on('postgres_changes', {
          event: 'INSERT', schema: 'public',
          table: 'notifications',
          filter: `user_id=eq.${currentUser.id}`
        }, () => loadNotifications())
        .subscribe()
    }

    async function loadStories() {
      const { data: stories } = await supabase
        .from('stories')
        .select('*, profiles(username, avatar_url)')
        .gt('expires_at', new Date().toISOString())
        .order('created_at', { ascending: false })

      const bar   = document.getElementById('storiesBar')
      const myBtn = bar.children[0]
      bar.innerHTML = ''
      bar.appendChild(myBtn)

      if (!stories || stories.length === 0) return

      const groups = {}
      stories.forEach(s => {
        if (!groups[s.user_id]) groups[s.user_id] = []
        groups[s.user_id].push(s)
      })

      allStories = Object.values(groups)

      allStories.forEach((group, gIdx) => {
        const user       = group[0].profiles
        const username   = user?.username || 'user'
        const initial    = username[0].toUpperCase()
        const avatarHtml = user?.avatar_url
          ? `<img src="${user.avatar_url}" alt="${username}"/>`
          : initial

        const item = document.createElement('div')
        item.className = 'story-item'
        item.innerHTML = `
          <div class="story-ring">
            <div class="story-ring-inner">${avatarHtml}</div>
          </div>
          <span class="story-username">${username}</span>`
        item.onclick = () => openStoryViewer(gIdx)
        bar.appendChild(item)
      })
    }

    window.openStoryUpload  = () => document.getElementById('storyUploadModal').classList.add('open')
    window.closeStoryUpload = () => {
      document.getElementById('storyUploadModal').classList.remove('open')
      document.getElementById('storyPreview').innerHTML = '📷 Click to choose photo'
      document.getElementById('story-caption-input').value = ''
      document.getElementById('story-file').value = ''
    }

    window.previewStory = function (event) {
      const file = event.target.files[0]
      if (!file) return
      const url = URL.createObjectURL(file)
      document.getElementById('storyPreview').innerHTML = `<img src="${url}" alt="preview"/>`
    }

    window.uploadStory = async function () {
      const file    = document.getElementById('story-file').files[0]
      const caption = document.getElementById('story-caption-input').value.trim()
      if (!file) { showToast('📷 Please choose a photo!'); return }
      showToast('⏳ Uploading story...')
      const fileName = `story_${currentUser.id}_${Date.now()}`
      const { error: uploadError } = await supabase.storage.from('post-images').upload(fileName, file)
      if (uploadError) { showToast('❌ Upload failed'); return }
      const { data: urlData } = supabase.storage.from('post-images').getPublicUrl(fileName)
      const { error } = await supabase.from('stories').insert({
        user_id: currentUser.id, media_url: urlData.publicUrl,
        media_type: 'image', caption
      })
      if (error) { showToast('❌ Story failed'); return }
      showToast('✨ Story shared!')
      closeStoryUpload()
      loadStories()
    }

    window.openStoryViewer = async function (groupIndex) {
      currentStoryGroupIndex = groupIndex
      currentStoryIndex      = 0
      document.getElementById('storyViewer').classList.add('open')
      await showStory()
    }

    async function showStory() {
      if (currentStoryGroupIndex >= allStories.length) { closeStoryViewer(); return }
      const group = allStories[currentStoryGroupIndex]
      if (!group || currentStoryIndex >= group.length) { closeStoryViewer(); return }

      const story    = group[currentStoryIndex]
      const user     = story.profiles
      const username = user?.username || 'user'

      const avatarEl = document.getElementById('viewerAvatar')
      if (user?.avatar_url) {
        avatarEl.innerHTML = `<img src="${user.avatar_url}" alt="${username}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;"/>`
      } else {
        avatarEl.textContent = username[0].toUpperCase()
      }

      document.getElementById('viewerName').textContent    = '@' + username
      document.getElementById('viewerTime').textContent    = formatTime(story.created_at)
      document.getElementById('storyMediaImg').src         = story.media_url
      document.getElementById('storyCaption').textContent  = story.caption || ''
      document.getElementById('storyViews').textContent    = `👁 ${story.views_count || 0} views`

      const bar = document.getElementById('storyProgressBar')
      bar.innerHTML = group.map((_, i) => `
        <div class="progress-segment">
          <div class="progress-fill" id="pfill-${i}" style="width:${i < currentStoryIndex ? '100%' : '0%'}"></div>
        </div>`).join('')

      clearTimeout(storyTimer)
      const fill = document.getElementById(`pfill-${currentStoryIndex}`)
      if (fill) {
        fill.style.transition = 'width 5s linear'
        setTimeout(() => fill.style.width = '100%', 50)
      }

      storyTimer = setTimeout(() => nextStory(), 5000)

      if (story.user_id !== currentUser.id) {
        await supabase.from('story_views').insert({
          story_id: story.id, viewer_id: currentUser.id
        }).then(() => {
          supabase.from('stories').update({ views_count: (story.views_count || 0) + 1 }).eq('id', story.id)
        })
      }
    }

    window.nextStory = function () {
      clearTimeout(storyTimer)
      const group = allStories[currentStoryGroupIndex]
      if (currentStoryIndex < group.length - 1) {
        currentStoryIndex++
      } else if (currentStoryGroupIndex < allStories.length - 1) {
        currentStoryGroupIndex++
        currentStoryIndex = 0
      } else { closeStoryViewer(); return }
      showStory()
    }

    window.prevStory = function () {
      clearTimeout(storyTimer)
      if (currentStoryIndex > 0) {
        currentStoryIndex--
      } else if (currentStoryGroupIndex > 0) {
        currentStoryGroupIndex--
        currentStoryIndex = allStories[currentStoryGroupIndex].length - 1
      }
      showStory()
    }

    window.closeStoryViewer = function () {
      clearTimeout(storyTimer)
      document.getElementById('storyViewer').classList.remove('open')
    }

    async function loadFeed() {
      const feedEl = document.getElementById('feed')
      feedEl.innerHTML = '<div class="loader">Loading posts...</div>'

      const { data: posts } = await supabase
        .from('posts')
        .select('*, profiles(username, avatar_url)')
        .order('created_at', { ascending: false })

      if (!posts || posts.length === 0) {
        feedEl.innerHTML = `
          <div class="empty-state">
            <div class="icon">✨</div>
            <p>No posts yet. Be the first to post!</p>
          </div>`
        return
      }

      feedEl.innerHTML = posts.map(post => renderPost(post)).join('')

      document.querySelectorAll('.like-btn').forEach(btn =>
        btn.addEventListener('click', () => toggleLike(btn.dataset.id, btn))
      )
      document.querySelectorAll('.comment-toggle').forEach(btn =>
        btn.addEventListener('click', () => toggleComments(btn.dataset.id))
      )
    }

    function renderPost(post) {
      const username   = post.profiles?.username || 'user'
      const initial    = username[0].toUpperCase()
      const timeAgo    = formatTime(post.created_at)
      const imgHtml    = post.image_url ? `<img class="post-img" src="${post.image_url}" alt="post"/>` : ''
      const avatarHtml = post.profiles?.avatar_url
        ? `<img src="${post.profiles.avatar_url}" alt="${username}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;"/>`
        : initial

      return `
        <div class="post-card" id="post-${post.id}">
          <div class="post-header">
            <div class="avatar" style="background:linear-gradient(135deg,#6C63FF,#00D4AA);overflow:hidden;">${avatarHtml}</div>
            <div>
              <div class="post-username">@${username}</div>
              <div class="post-time">${timeAgo}</div>
            </div>
          </div>
          ${post.content ? `<div class="post-text">${post.content}</div>` : ''}
          ${imgHtml}
          <div class="post-footer">
            <button class="action-btn like-btn" data-id="${post.id}">
              ❤️ <span class="like-count">${post.likes_count || 0}</span>
            </button>
            <button class="action-btn comment-toggle" data-id="${post.id}">
              💬 <span id="cc-${post.id}">0</span>
            </button>
          </div>
          <div class="comments-section" id="comments-${post.id}">
            <div class="comments-list" id="clist-${post.id}">
              <div class="no-comments">No comments yet</div>
            </div>
            <div class="comment-input-row">
              <input class="comment-input" id="cinput-${post.id}" placeholder="Write a comment..."/>
              <button class="comment-send" onclick="sendComment('${post.id}','${post.user_id}')">➤</button>
            </div>
          </div>
        </div>`
    }

    window.toggleComments = async function (postId) {
      const section = document.getElementById(`comments-${postId}`)
      const btn     = document.querySelector(`.comment-toggle[data-id="${postId}"]`)
      const isOpen  = section.classList.contains('open')
      section.classList.toggle('open')
      btn.classList.toggle('active')
      if (!isOpen) await loadComments(postId)
    }

    async function loadComments(postId) {
      const listEl = document.getElementById(`clist-${postId}`)
      listEl.innerHTML = '<div class="no-comments">Loading...</div>'
      const { data: comments } = await supabase
        .from('comments').select('*, profiles(username)')
        .eq('post_id', postId).order('created_at', { ascending: true })
      const countEl = document.getElementById(`cc-${postId}`)
      if (countEl) countEl.textContent = comments?.length || 0
      if (!comments || comments.length === 0) {
        listEl.innerHTML = '<div class="no-comments">No comments yet — be first! 👇</div>'
        return
      }
      listEl.innerHTML = comments.map(c => {
        const username = c.profiles?.username || 'user'
        return `
          <div class="comment-item">
            <div class="comment-avatar">${username[0].toUpperCase()}</div>
            <div class="comment-bubble">
              <div class="comment-username">@${username}</div>
              <div class="comment-text">${c.content}</div>
              <div class="comment-time">${formatTime(c.created_at)}</div>
            </div>
          </div>`
      }).join('')
    }

    window.sendComment = async function (postId, postOwnerId) {
      const input   = document.getElementById(`cinput-${postId}`)
      const content = input.value.trim()
      if (!content) return
      input.value = ''
      const { error } = await supabase.from('comments').insert({
        post_id: postId, user_id: currentUser.id, content
      })
      if (!error) {
        await loadComments(postId)
        if (postOwnerId !== currentUser.id) {
          await supabase.from('notifications').insert({
            user_id: postOwnerId, actor_id: currentUser.id,
            type: 'comment', post_id: postId
          })
        }
      }
    }

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && e.target.classList.contains('comment-input')) {
        e.target.nextElementSibling?.click()
      }
      if (e.key === 'Escape')     closeStoryViewer()
      if (e.key === 'ArrowRight') nextStory()
      if (e.key === 'ArrowLeft')  prevStory()
    })

    async function toggleLike(postId, btn) {
      const countSpan = btn.querySelector('.like-count')
      const isLiked   = btn.classList.contains('liked')
      const newCount  = parseInt(countSpan.textContent) + (isLiked ? -1 : 1)
      countSpan.textContent = newCount
      btn.classList.toggle('liked')
      await supabase.from('posts').update({ likes_count: newCount }).eq('id', postId)
      if (!isLiked) {
        const { data: post } = await supabase.from('posts').select('user_id').eq('id', postId).single()
        if (post && post.user_id !== currentUser.id) {
          await supabase.from('notifications').insert({
            user_id: post.user_id, actor_id: currentUser.id,
            type: 'like', post_id: postId
          })
        }
      }
    }

    window.createPost = async function () {
      const text  = document.getElementById('post-text').value.trim()
      const file  = document.getElementById('post-img').files[0]
      const msgEl = document.getElementById('post-msg')
      msgEl.className = 'msg'
      if (!text && !file) {
        msgEl.className = 'msg error'
        msgEl.textContent = 'Write something or add a photo!'
        return
      }
      let imageUrl = null
      if (file) {
        const fileName = `${currentUser.id}/${Date.now()}_${file.name}`
        const { error: uploadError } = await supabase.storage.from('post-images').upload(fileName, file)
        if (uploadError) {
          msgEl.className = 'msg error'
          msgEl.textContent = 'Image upload failed: ' + uploadError.message
          return
        }
        const { data: urlData } = supabase.storage.from('post-images').getPublicUrl(fileName)
        imageUrl = urlData.publicUrl
      }
      const { error } = await supabase.from('posts').insert({
        user_id: currentUser.id, content: text,
        image_url: imageUrl, likes_count: 0
      })
      if (error) {
        msgEl.className = 'msg error'
        msgEl.textContent = 'Post failed: ' + error.message
        return
      }
      document.getElementById('post-text').value = ''
      document.getElementById('post-img').value  = ''
      loadFeed()
    }

    async function loadNotifications() {
      const { data: notifs } = await supabase
        .from('notifications')
        .select('*, actor:profiles!notifications_actor_id_fkey(username)')
        .eq('user_id', currentUser.id)
        .order('created_at', { ascending: false })
        .limit(20)
      const unread = (notifs || []).filter(n => !n.read).length
      const badge  = document.getElementById('notifBadge')
      badge.textContent = unread
      badge.classList.toggle('show', unread > 0)
      const listEl = document.getElementById('notifList')
      if (!notifs || notifs.length === 0) {
        listEl.innerHTML = '<div class="notif-empty">🔔 No notifications yet</div>'
        return
      }
      listEl.innerHTML = notifs.map(n => {
        const actor   = n.actor?.username || 'Someone'
        const initial = actor[0].toUpperCase()
        const typeMsg = n.type === 'like'
          ? `<span>@${actor}</span> liked your post ❤️`
          : `<span>@${actor}</span> commented on your post 💬`
        return `
          <div class="notif-item ${n.read ? '' : 'unread'}">
            <div class="notif-avatar">${initial}</div>
            <div>
              <div class="notif-text">${typeMsg}</div>
              <div class="notif-time">${formatTime(n.created_at)}</div>
            </div>
          </div>`
      }).join('')
    }

    window.toggleNotifDropdown = function () {
      document.getElementById('notifDropdown').classList.toggle('open')
    }

    window.markAllRead = async function () {
      await supabase.from('notifications').update({ read: true }).eq('user_id', currentUser.id)
      loadNotifications()
    }

    document.addEventListener('click', (e) => {
      const dropdown = document.getElementById('notifDropdown')
      const bell     = document.querySelector('.notif-bell')
      if (!dropdown.contains(e.target) && !bell.contains(e.target)) {
        dropdown.classList.remove('open')
      }
    })

    window.logout = async function () {
      await supabase.auth.signOut()
      window.location.href = 'index.html'
    }

    function showToast(msg) {
      const t = document.getElementById('toast')
      t.textContent = msg
      t.classList.add('show')
      setTimeout(() => t.classList.remove('show'), 2500)
    }

    function formatTime(dateStr) {
      const diff = Math.floor((Date.now() - new Date(dateStr)) / 1000)
      if (diff < 60)    return `${diff}s ago`
      if (diff < 3600)  return `${Math.floor(diff/60)}m ago`
      if (diff < 86400) return `${Math.floor(diff/3600)}h ago`
      return `${Math.floor(diff/86400)}d ago`
    }

    init()
  </script>

</body>
</html>
