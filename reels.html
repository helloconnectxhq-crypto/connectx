<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>ConnectX – Reels</title>
  <link rel="manifest" href="manifest.json"/>
  <meta name="theme-color" content="#6C63FF"/>
  <link rel="icon" href="favicon.ico" sizes="any"/>
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png"/>
  <link rel="apple-touch-icon" href="icon-192.png"/>
  <link rel="manifest" href="manifest.json"/>
  <meta name="theme-color" content="#000000"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <link rel="stylesheet" href="style.css"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #000;
      overflow: hidden;
      height: 100vh;
    }

    .reels-container {
      height: 100vh;
      overflow-y: scroll;
      scroll-snap-type: y mandatory;
      scrollbar-width: none;
    }

    .reels-container::-webkit-scrollbar { display: none; }

    .reel-item {
      height: 100vh;
      width: 100%;
      scroll-snap-align: start;
      position: relative;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .reel-video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .reel-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(transparent 30%, rgba(0,0,0,0.3) 60%, rgba(0,0,0,0.85) 100%);
      pointer-events: none;
    }

    .reels-nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      z-index: 100;
      background: linear-gradient(rgba(0,0,0,0.5), transparent);
    }

    .reels-nav-title {
      font-size: 18px;
      font-weight: 800;
      color: #fff;
    }

    .reels-nav-actions {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .reels-nav-actions a {
      color: rgba(255,255,255,0.7);
      font-size: 13px;
      font-weight: 600;
      text-decoration: none;
    }

    .back-btn {
      background: none;
      border: none;
      color: #fff;
      font-size: 22px;
      cursor: pointer;
      padding: 4px;
    }

    .upload-btn {
      background: none;
      border: none;
      color: #fff;
      font-size: 24px;
      cursor: pointer;
      padding: 4px;
    }

    .reel-actions {
      position: absolute;
      right: 16px;
      bottom: 100px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      z-index: 10;
    }

    .reel-action-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      cursor: pointer;
      background: none;
      border: none;
    }

    .action-icon {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(10px);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      transition: background 0.2s, transform 0.15s;
      border: 1px solid rgba(255,255,255,0.2);
    }

    .reel-action-btn:active .action-icon { transform: scale(0.88); }
    .reel-action-btn.liked .action-icon { background: rgba(255,101,132,0.3); }

    .action-count {
      font-size: 12px;
      font-weight: 700;
      color: #fff;
    }

    .reel-avatar-btn {
      position: relative;
      cursor: pointer;
    }

    .reel-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 2px solid #fff;
      overflow: hidden;
      background: linear-gradient(135deg, #6C63FF, #00D4AA);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      font-weight: 700;
      color: #fff;
    }

    .reel-avatar img { width: 100%; height: 100%; object-fit: cover; }

    .follow-dot {
      position: absolute;
      bottom: -4px;
      left: 50%;
      transform: translateX(-50%);
      width: 20px;
      height: 20px;
      background: var(--violet);
      border-radius: 50%;
      border: 2px solid #000;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      color: #fff;
      font-weight: 700;
    }

    .reel-info {
      position: absolute;
      bottom: 0; left: 0; right: 70px;
      padding: 20px 16px 30px;
      z-index: 10;
    }

    .reel-username {
      font-size: 15px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .reel-follow-btn {
      font-size: 12px;
      font-weight: 700;
      color: #fff;
      border: 1px solid #fff;
      background: transparent;
      padding: 3px 10px;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .reel-follow-btn:hover { background: rgba(255,255,255,0.2); }
    .reel-follow-btn.following { border-color: var(--violet); color: var(--violet); }

    .reel-caption {
      font-size: 14px;
      color: rgba(255,255,255,0.9);
      line-height: 1.5;
      margin-bottom: 10px;
      max-height: 60px;
      overflow: hidden;
    }

    .reel-caption.expanded { max-height: none; }

    .read-more {
      font-size: 13px;
      color: rgba(255,255,255,0.6);
      cursor: pointer;
      background: none;
      border: none;
      padding: 0;
    }

    .reel-music {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: rgba(255,255,255,0.8);
    }

    .music-disc {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: linear-gradient(135deg, #6C63FF, #FF6584);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      animation: spin 3s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .music-text {
      overflow: hidden;
      white-space: nowrap;
      max-width: 180px;
    }

    .tap-overlay {
      position: absolute;
      inset: 0;
      z-index: 5;
    }

    .play-pause-icon {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%) scale(0);
      font-size: 60px;
      opacity: 0;
      transition: all 0.2s;
      pointer-events: none;
      z-index: 20;
    }

    .play-pause-icon.show {
      transform: translate(-50%, -50%) scale(1);
      opacity: 1;
    }

    .upload-modal {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.9);
      z-index: 500;
      display: none;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(10px);
    }

    .upload-modal.open { display: flex; }

    .upload-card {
      background: #1A1A2E;
      border-radius: 24px;
      padding: 28px 24px;
      width: 100%;
      max-width: 420px;
      border: 1px solid rgba(255,255,255,0.1);
      animation: slideUp 0.3s ease;
    }

    @keyframes slideUp {
      from { transform: translateY(30px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    .upload-title {
      font-size: 20px;
      font-weight: 800;
      color: #fff;
      margin-bottom: 20px;
      text-align: center;
    }

    .video-preview-box {
      width: 100%;
      height: 240px;
      border-radius: 16px;
      background: rgba(255,255,255,0.05);
      border: 2px dashed rgba(255,255,255,0.2);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      margin-bottom: 16px;
      transition: border-color 0.2s;
      overflow: hidden;
    }

    .video-preview-box:hover { border-color: var(--violet); }
    .video-preview-box video { width: 100%; height: 100%; object-fit: cover; }

    .upload-icon { font-size: 40px; margin-bottom: 8px; }
    .upload-hint { font-size: 13px; color: rgba(255,255,255,0.5); }

    .caption-input {
      width: 100%;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      color: #fff;
      font-size: 14px;
      padding: 12px 14px;
      outline: none;
      margin-bottom: 16px;
      transition: border 0.2s;
    }

    .caption-input:focus { border-color: var(--violet); }

    .upload-actions { display: flex; gap: 10px; }

    .upload-cancel {
      flex: 1;
      padding: 13px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.15);
      background: transparent;
      color: rgba(255,255,255,0.6);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }

    .upload-submit {
      flex: 2;
      padding: 13px;
      border-radius: 12px;
      border: none;
      background: linear-gradient(135deg, #6C63FF, #00D4AA);
      color: #fff;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .upload-submit:hover { opacity: 0.9; }
    .upload-submit:disabled { opacity: 0.5; cursor: not-allowed; }

    .upload-progress {
      width: 100%;
      height: 4px;
      background: rgba(255,255,255,0.1);
      border-radius: 2px;
      margin-bottom: 16px;
      display: none;
    }

    .upload-progress.show { display: block; }

    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #6C63FF, #00D4AA);
      border-radius: 2px;
      width: 0%;
      transition: width 0.3s;
    }

    .comments-panel {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: #1A1A2E;
      border-radius: 24px 24px 0 0;
      padding: 16px;
      z-index: 200;
      transform: translateY(100%);
      transition: transform 0.3s ease;
      max-height: 60vh;
      display: flex;
      flex-direction: column;
    }

    .comments-panel.open { transform: translateY(0); }

    .panel-handle {
      width: 40px;
      height: 4px;
      background: rgba(255,255,255,0.2);
      border-radius: 2px;
      margin: 0 auto 16px;
    }

    .panel-title {
      font-size: 16px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 14px;
      text-align: center;
    }

    .comments-scroll {
      flex: 1;
      overflow-y: auto;
      margin-bottom: 12px;
      scrollbar-width: thin;
    }

    .comment-item {
      display: flex;
      gap: 10px;
      margin-bottom: 14px;
      align-items: flex-start;
    }

    .comment-av {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: linear-gradient(135deg, #6C63FF, #00D4AA);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 700;
      color: #fff;
      flex-shrink: 0;
    }

    .comment-body { flex: 1; }
    .comment-user { font-size: 12px; font-weight: 700; color: var(--violet); }
    .comment-text { font-size: 13px; color: rgba(255,255,255,0.85); line-height: 1.4; }
    .comment-time { font-size: 11px; color: rgba(255,255,255,0.4); margin-top: 2px; }

    .comment-input-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .comment-inp {
      flex: 1;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      color: #fff;
      font-size: 13px;
      padding: 10px 14px;
      outline: none;
    }

    .comment-inp:focus { border-color: var(--violet); }

    .comment-send-btn {
      background: var(--violet);
      border: none;
      border-radius: 50%;
      width: 36px;
      height: 36px;
      color: #fff;
      font-size: 15px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .reels-empty {
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: rgba(255,255,255,0.5);
      gap: 16px;
    }

    .reels-empty .icon { font-size: 60px; }
    .reels-empty p { font-size: 16px; }

    .start-upload-btn {
      background: linear-gradient(135deg, #6C63FF, #00D4AA);
      color: #fff;
      border: none;
      padding: 14px 28px;
      border-radius: 14px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }

    .toast {
      position: fixed;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%) translateY(40px);
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(10px);
      color: #fff;
      padding: 12px 24px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      border: 1px solid rgba(255,255,255,0.2);
      transition: transform 0.3s ease;
      z-index: 9999;
      opacity: 0;
    }

    .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

    .reel-loader {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: rgba(255,255,255,0.5);
      font-size: 14px;
    }

    @media (max-width: 480px) {
      .reel-actions {
        right: 10px;
        bottom: 80px;
        gap: 14px;
      }

      .action-icon {
        width: 38px;
        height: 38px;
        font-size: 16px;
      }

      .reel-avatar {
        width: 38px;
        height: 38px;
        font-size: 14px;
      }

      .reel-info {
        padding: 12px 12px 20px;
        right: 60px;
      }

      .reel-username {
        font-size: 13px;
      }

      .reel-caption {
        font-size: 13px;
        max-height: 40px;
      }

      .action-count {
        font-size: 10px;
      }

      .reels-nav {
        padding: 10px 14px;
      }

      .reels-nav-title {
        font-size: 15px;
      }
    }
  </style>
</head>
<body>

  <!-- ===== SIDE DRAWER ===== -->
  <div class="drawer-overlay" id="drawerOverlay" onclick="closeDrawer()"></div>
  <div class="side-drawer" id="sideDrawer">
    <div class="drawer-header">
      <div class="drawer-avatar" id="drawerAvatar">U</div>
      <div>
        <div class="drawer-name" id="drawerName">ConnectX</div>
        <div class="drawer-username" id="drawerUsername">@user</div>
      </div>
    </div>
    <nav class="drawer-nav">
      <a href="feed.html"     class="drawer-item">🏠 <span>Home Feed</span></a>
      <a href="profile.html"  class="drawer-item">👤 <span>My Profile</span></a>
      <a href="messages.html" class="drawer-item">💬 <span>Messages</span></a>
      <a href="reels.html"    class="drawer-item active">🎬 <span>Reels</span></a>
      <a href="live.html"     class="drawer-item">🔴 <span>Go Live</span></a>
      <a href="search.html"   class="drawer-item">🔍 <span>Search</span></a>
    </nav>
    <div class="drawer-footer">
      <button class="drawer-logout" onclick="logout()">🚪 Logout</button>
    </div>
  </div>

  <!-- Top Nav -->
  <div class="reels-nav">
    <button class="hamburger-btn on-dark" onclick="openDrawer()" aria-label="Menu" style="position:relative;top:0;left:0;background:rgba(0,0,0,0.4);border-radius:10px;width:38px;height:38px;">
      <span></span><span></span><span></span>
    </button>
    <div class="reels-nav-title">🎬 Reels</div>
    <div class="reels-nav-actions">
      <button class="upload-btn" onclick="openUpload()">＋</button>
    </div>
  </div>

  <nav class="bottom-nav" style="z-index:50;">
    <a href="feed.html"     class="nav-item"><span class="nav-icon">🏠</span><span>Home</span></a>
    <a href="search.html"   class="nav-item"><span class="nav-icon">🔍</span><span>Search</span></a>
    <a href="reels.html"    class="nav-item active"><span class="nav-icon">🎬</span><span>Reels</span></a>
    <a href="messages.html" class="nav-item"><span class="nav-icon">💬</span><span>Messages</span></a>
    <a href="profile.html"  class="nav-item"><span class="nav-icon">👤</span><span>Profile</span></a>
  </nav>

  <!-- Reels Container -->
  <div class="reels-container" id="reelsContainer">
    <div class="reel-loader">Loading reels...</div>
  </div>

  <!-- Upload Modal -->
  <div class="upload-modal" id="uploadModal">
    <div class="upload-card">
      <div class="upload-title">🎬 Share a Reel</div>

      <div class="video-preview-box" id="videoPreviewBox" onclick="document.getElementById('reel-file').click()">
        <div class="upload-icon">🎥</div>
        <div class="upload-hint">Tap to choose video</div>
      </div>
      <input type="file" id="reel-file" accept="video/*" style="display:none" onchange="previewReel(event)"/>

      <input class="caption-input" id="reel-caption" placeholder="Write a caption... #hashtag"/>

      <div class="upload-progress" id="uploadProgress">
        <div class="progress-bar" id="progressBar"></div>
      </div>

      <div class="upload-actions">
        <button class="upload-cancel" onclick="closeUpload()">Cancel</button>
        <button class="upload-submit" id="uploadSubmitBtn" onclick="uploadReel()">Share Reel 🚀</button>
      </div>
    </div>
  </div>

  <!-- Comments Panel -->
  <div class="comments-panel" id="commentsPanel">
    <div class="panel-handle"></div>
    <div class="panel-title">💬 Comments</div>
    <div class="comments-scroll" id="commentsList"></div>
    <div class="comment-input-row">
      <input class="comment-inp" id="reelCommentInput" placeholder="Add a comment..."/>
      <button class="comment-send-btn" onclick="sendReelComment()">➤</button>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script type="module">
    import { supabase } from './supabase.js'

    let currentUser = null
    let currentProfile = null
    let reels = []
    let activeReelId = null
    let followingIds = new Set()
    let likedIds = new Set()

    async function init() {
      const { data: { session } } = await supabase.auth.getSession()
      if (!session) { window.location.href = 'index.html'; return }
      currentUser = session.user

      const { data } = await supabase
        .from('profiles').select('username, avatar_url')
        .eq('id', currentUser.id).single()
      currentProfile = data

      if (data) {
        const uname = data.username || 'User'
        document.getElementById('drawerName').textContent = uname
        document.getElementById('drawerUsername').textContent = '@' + uname
        const da = document.getElementById('drawerAvatar')
        if (data.avatar_url) { da.innerHTML = `<img src="${data.avatar_url}" alt="${uname}"/>` }
        else { da.textContent = uname[0].toUpperCase() }
      }

      await loadFollowing()
      await loadReels()
    }

    window.openDrawer = function() {
      document.getElementById('sideDrawer').classList.add('open')
      document.getElementById('drawerOverlay').classList.add('open')
      document.body.style.overflow = 'hidden'
    }
    window.closeDrawer = function() {
      document.getElementById('sideDrawer').classList.remove('open')
      document.getElementById('drawerOverlay').classList.remove('open')
      document.body.style.overflow = ''
    }
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeDrawer() })

    async function loadFollowing() {
      const { data } = await supabase
        .from('follows').select('following_id')
        .eq('follower_id', currentUser.id)
      followingIds = new Set((data || []).map(f => f.following_id))
    }

    async function loadReels() {
      const container = document.getElementById('reelsContainer')

      let { data, error } = await supabase
        .from('reels')
        .select('*, profiles(username, avatar_url, full_name)')
        .order('created_at', { ascending: false })

      // Fallback if FK join fails
      if (error) {
        const fallback = await supabase.from('reels').select('*').order('created_at', { ascending: false })
        data = fallback.data || []
        const uids = [...new Set(data.map(r => r.user_id))]
        if (uids.length) {
          const { data: profiles } = await supabase.from('profiles').select('id,username,avatar_url,full_name').in('id', uids)
          const pm = {}; (profiles||[]).forEach(p => pm[p.id] = p)
          data.forEach(r => r.profiles = pm[r.user_id] || null)
        }
      }

      if (!data || data.length === 0) {
        container.innerHTML = `
          <div class="reels-empty">
            <div class="icon">🎬</div>
            <p>No reels yet!</p>
            <button class="start-upload-btn" onclick="openUpload()">🎥 Share First Reel</button>
          </div>`
        return
      }

      reels = data
      container.innerHTML = data.map((reel, idx) => renderReel(reel, idx)).join('')

      // Subscribe to real-time updates
      data.forEach(reel => {
        subscribeToReelLikes(reel.id)
      })

      // Setup autoplay
      setupAutoplay()
    }

    function renderReel(reel, idx) {
      const user = reel.profiles
      const username = user?.username || 'user'
      const initial = username[0].toUpperCase()
      const avatarHtml = user?.avatar_url
        ? `<img src="${user.avatar_url}" alt="${username}"/>`
        : initial
      const isFollowing = followingIds.has(reel.user_id)
      const isOwn = reel.user_id === currentUser.id
      const caption = reel.caption || ''
      const shortCaption = caption.length > 80 ? caption.substring(0, 80) + '...' : caption
      const isLiked = likedIds.has(reel.id)

      return `
        <div class="reel-item" id="reel-${reel.id}" data-reel-id="${reel.id}" data-index="${idx}">
          <video
            class="reel-video"
            id="video-${reel.id}"
            src="${reel.video_url}"
            loop
            playsinline
            preload="metadata"
          ></video>

          <div class="reel-overlay"></div>

          <div class="tap-overlay" onclick="togglePlay('${reel.id}')"></div>
          <div class="play-pause-icon" id="ppi-${reel.id}">⏸</div>

          <div class="reel-actions">
            <div class="reel-avatar-btn" onclick="visitProfile('${reel.user_id}')">
              <div class="reel-avatar">${avatarHtml}</div>
              ${!isOwn ? `<div class="follow-dot" id="fdot-${reel.id}" onclick="event.stopPropagation();toggleFollowReel('${reel.user_id}','${reel.id}')">${isFollowing ? '✓' : '+'}</div>` : ''}
            </div>

            <button class="reel-action-btn ${isLiked ? 'liked' : ''}" id="like-btn-${reel.id}" onclick="toggleReelLike('${reel.id}')">
              <div class="action-icon">❤️</div>
              <span class="action-count" id="like-count-${reel.id}">${reel.likes_count || 0}</span>
            </button>

            <button class="reel-action-btn" onclick="openComments('${reel.id}')">
              <div class="action-icon">💬</div>
              <span class="action-count" id="comment-count-${reel.id}">0</span>
            </button>

            <button class="reel-action-btn" onclick="shareReel('${reel.id}')">
              <div class="action-icon">↗️</div>
              <span class="action-count">Share</span>
            </button>

            ${isOwn ? `
            <button class="reel-action-btn" onclick="deleteReel('${reel.id}')">
              <div class="action-icon">🗑️</div>
              <span class="action-count">Delete</span>
            </button>` : ''}
          </div>

          <div class="reel-info">
            <div class="reel-username">
              @${username}
              ${!isOwn ? `
              <button class="reel-follow-btn ${isFollowing ? 'following' : ''}" id="fbtn-${reel.id}" onclick="toggleFollowReel('${reel.user_id}','${reel.id}')">
                ${isFollowing ? 'Following' : 'Follow'}
              </button>` : ''}
            </div>
            ${caption ? `
            <div class="reel-caption" id="caption-${reel.id}">${shortCaption}</div>
            ${caption.length > 80 ? `<button class="read-more" onclick="expandCaption('${reel.id}')">more</button>` : ''}
            ` : ''}
            <div class="reel-music">
              <div class="music-disc">🎵</div>
              <div class="music-text">Original Audio · @${username}</div>
            </div>
          </div>
        </div>`
    }

    // ===== REAL-TIME REEL LIKES =====
    function subscribeToReelLikes(reelId) {
      supabase.channel(`reel-likes-${reelId}`)
        .on('postgres_changes', {
          event: 'UPDATE',
          schema: 'public',
          table: 'reels',
          filter: `id=eq.${reelId}`
        }, (payload) => {
          const newCount = payload.new.likes_count
          const countEl = document.getElementById(`like-count-${reelId}`)
          if (countEl) {
            countEl.textContent = newCount
          }
        })
        .subscribe()
    }

    // ===== AUTOPLAY =====
    function setupAutoplay() {
      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          const reelId = entry.target.dataset.reelId
          const video = document.getElementById(`video-${reelId}`)
          if (!video) return

          if (entry.isIntersecting) {
            video.play().catch(() => {})
            activeReelId = reelId
            recordView(reelId)
            // Load comments count
            loadReelCommentCount(reelId)
          } else {
            video.pause()
          }
        })
      }, { threshold: 0.7 })

      document.querySelectorAll('.reel-item').forEach(item => observer.observe(item))
    }

    async function recordView(reelId) {
      await supabase.from('reels')
        .update({ views_count: supabase.raw('views_count + 1') })
        .eq('id', reelId)
    }

    async function loadReelCommentCount(reelId) {
      const { count } = await supabase
        .from('comments')
        .select('*', { count: 'exact', head: true })
        .eq('reel_id', reelId)
      
      const countEl = document.getElementById(`comment-count-${reelId}`)
      if (countEl) countEl.textContent = count || 0
    }

    // ===== PLAY/PAUSE =====
    window.togglePlay = function(reelId) {
      const video = document.getElementById(`video-${reelId}`)
      const icon = document.getElementById(`ppi-${reelId}`)
      if (!video) return

      if (video.paused) {
        video.play()
        icon.textContent = '▶️'
      } else {
        video.pause()
        icon.textContent = '⏸'
      }

      icon.classList.add('show')
      setTimeout(() => icon.classList.remove('show'), 800)
    }

    // ===== LIKE =====
    window.toggleReelLike = async function(reelId) {
      const btn = document.getElementById(`like-btn-${reelId}`)
      const countEl = document.getElementById(`like-count-${reelId}`)
      const isLiked = likedIds.has(reelId)
      const newCount = parseInt(countEl.textContent) + (isLiked ? -1 : 1)

      countEl.textContent = newCount
      if (isLiked) {
        likedIds.delete(reelId)
        btn.classList.remove('liked')
      } else {
        likedIds.add(reelId)
        btn.classList.add('liked')
      }

      await supabase.from('reels').update({ likes_count: newCount }).eq('id', reelId)
    }

    // ===== FOLLOW =====
    window.toggleFollowReel = async function(userId, reelId) {
      const isFollowing = followingIds.has(userId)
      const fbtn = document.getElementById(`fbtn-${reelId}`)
      const fdot = document.getElementById(`fdot-${reelId}`)

      if (isFollowing) {
        followingIds.delete(userId)
        if (fbtn) { fbtn.textContent = 'Follow'; fbtn.classList.remove('following') }
        if (fdot) fdot.textContent = '+'
        await supabase.from('follows').delete()
          .eq('follower_id', currentUser.id).eq('following_id', userId)
      } else {
        followingIds.add(userId)
        if (fbtn) { fbtn.textContent = 'Following'; fbtn.classList.add('following') }
        if (fdot) fdot.textContent = '✓'
        await supabase.from('follows').insert({
          follower_id: currentUser.id, following_id: userId
        })
      }
      showToast(isFollowing ? 'Unfollowed' : 'Following! ✓')
    }

    // ===== COMMENTS =====
    let activeCommentReelId = null

    window.openComments = async function(reelId) {
      activeCommentReelId = reelId
      document.getElementById('commentsPanel').classList.add('open')
      await loadReelComments(reelId)
    }

    document.addEventListener('click', (e) => {
      const panel = document.getElementById('commentsPanel')
      if (!panel.contains(e.target) && !e.target.closest('.reel-action-btn')) {
        panel.classList.remove('open')
      }
    })

    async function loadReelComments(reelId) {
      const listEl = document.getElementById('commentsList')
      listEl.innerHTML = '<div style="text-align:center;color:rgba(255,255,255,0.4);padding:20px;">Loading...</div>'

      const { data: comments } = await supabase
        .from('comments').select('*, profiles(username)')
        .eq('reel_id', reelId).order('created_at', { ascending: true })

      if (!comments || comments.length === 0) {
        listEl.innerHTML = '<div style="text-align:center;color:rgba(255,255,255,0.4);padding:20px;">No comments yet 👇</div>'
        return
      }

      listEl.innerHTML = comments.map(c => {
        const u = c.profiles?.username || 'user'
        return `
          <div class="comment-item">
            <div class="comment-av">${u[0].toUpperCase()}</div>
            <div class="comment-body">
              <div class="comment-user">@${u}</div>
              <div class="comment-text">${c.content}</div>
              <div class="comment-time">${formatTime(c.created_at)}</div>
            </div>
          </div>`
      }).join('')
    }

    window.sendReelComment = async function() {
      const input = document.getElementById('reelCommentInput')
      const content = input.value.trim()
      if (!content || !activeCommentReelId) return
      input.value = ''

      await supabase.from('comments').insert({
        reel_id: activeCommentReelId,
        user_id: currentUser.id,
        content
      })

      await loadReelComments(activeCommentReelId)
      
      // Update comment count
      const countEl = document.getElementById(`comment-count-${activeCommentReelId}`)
      if (countEl) {
        const current = parseInt(countEl.textContent) || 0
        countEl.textContent = current + 1
      }
    }

    document.getElementById('reelCommentInput').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') sendReelComment()
    })

    // ===== SHARE =====
    window.shareReel = function(reelId) {
      const url = `${window.location.origin}/reels.html#${reelId}`
      navigator.clipboard.writeText(url).then(() => showToast('🔗 Link copied!'))
    }

    // ===== DELETE =====
    window.deleteReel = async function(reelId) {
      if (!confirm('Delete this reel?')) return
      const { error } = await supabase.from('reels').delete().eq('id', reelId)
      if (!error) {
        document.getElementById(`reel-${reelId}`)?.remove()
        showToast('🗑️ Reel deleted!')
      }
    }

    // ===== EXPAND CAPTION =====
    window.expandCaption = function(reelId) {
      const reel = reels.find(r => r.id === reelId)
      const captionEl = document.getElementById(`caption-${reelId}`)
      if (captionEl && reel) {
        captionEl.textContent = reel.caption
        captionEl.className = 'reel-caption expanded'
        captionEl.nextElementSibling?.remove()
      }
    }

    // ===== UPLOAD =====
    window.openUpload = () => document.getElementById('uploadModal').classList.add('open')
    window.closeUpload = () => {
      document.getElementById('uploadModal').classList.remove('open')
      document.getElementById('videoPreviewBox').innerHTML = '<div class="upload-icon">🎥</div><div class="upload-hint">Tap to choose video</div>'
      document.getElementById('reel-caption').value = ''
      document.getElementById('reel-file').value = ''
      document.getElementById('uploadProgress').classList.remove('show')
      document.getElementById('progressBar').style.width = '0%'
      document.getElementById('uploadSubmitBtn').disabled = false
    }

    window.previewReel = function(event) {
      const file = event.target.files[0]
      if (!file) return
      const url = URL.createObjectURL(file)
      const box = document.getElementById('videoPreviewBox')
      box.innerHTML = `<video src="${url}" controls style="width:100%;height:100%;object-fit:cover;border-radius:14px;"></video>`
    }

    window.uploadReel = async function() {
      const file = document.getElementById('reel-file').files[0]
      const caption = document.getElementById('reel-caption').value.trim()
      const btn = document.getElementById('uploadSubmitBtn')

      if (!file) { showToast('🎥 Choose a video first!'); return }

      btn.disabled = true
      btn.textContent = 'Uploading...'
      document.getElementById('uploadProgress').classList.add('show')

      let progress = 0
      const progInterval = setInterval(() => {
        progress = Math.min(progress + 10, 85)
        document.getElementById('progressBar').style.width = progress + '%'
      }, 300)

      const fileName = `${currentUser.id}/reel_${Date.now()}.${file.name.split('.').pop()}`
      const { error: uploadError } = await supabase.storage
        .from('reels').upload(fileName, file, { cacheControl: '3600', upsert: false })

      clearInterval(progInterval)
      document.getElementById('progressBar').style.width = '100%'

      if (uploadError) {
        showToast('❌ Upload failed: ' + uploadError.message)
        btn.disabled = false; btn.textContent = 'Share Reel 🚀'
        return
      }

      const { data: urlData } = supabase.storage.from('reels').getPublicUrl(fileName)

      const { error } = await supabase.from('reels').insert({
        user_id: currentUser.id,
        video_url: urlData.publicUrl,
        caption
      })

      if (error) {
        showToast('❌ Failed to save reel')
        btn.disabled = false; btn.textContent = 'Share Reel 🚀'
        return
      }

      showToast('🎬 Reel shared!')
      closeUpload()
      loadReels()
    }

    window.visitProfile = function(userId) {
      if (userId === currentUser.id) {
        window.location.href = 'profile.html'
      } else {
        window.location.href = `search.html?user=${userId}`
      }
    }

    function showToast(msg) {
      const t = document.getElementById('toast')
      t.textContent = msg
      t.classList.add('show')
      setTimeout(() => t.classList.remove('show'), 2500)
    }

    function formatTime(dateStr) {
      const diff = Math.floor((Date.now() - new Date(dateStr)) / 1000)
      if (diff < 60) return `${diff}s ago`
      if (diff < 3600) return `${Math.floor(diff/60)}m ago`
      if (diff < 86400) return `${Math.floor(diff/3600)}h ago`
      return `${Math.floor(diff/86400)}d ago`
    }

    init()
  </script>

</body>
</html>
