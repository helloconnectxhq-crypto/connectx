<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reset Password – ConnectX</title>
  <meta name="robots" content="noindex"/>
  <link rel="manifest" href="manifest.json"/>
  <meta name="theme-color" content="#6C63FF"/>
  <link rel="icon" href="favicon.ico" sizes="any"/>
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png"/>
  <link rel="apple-touch-icon" href="icon-192.png"/>
  <link rel="stylesheet" href="style.css"/>
  <style>
    .auth-page {
      background: radial-gradient(ellipse at top left, rgba(108,99,255,0.15) 0%, transparent 60%),
                  radial-gradient(ellipse at bottom right, rgba(0,212,170,0.1) 0%, transparent 60%),
                  var(--bg);
    }
    .auth-card { animation: fadeUp 0.4s ease; }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .logo {
      background: linear-gradient(135deg, #6C63FF, #00D4AA);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .password-wrapper { position: relative; }
    .password-wrapper input { padding-right: 44px; }
    .toggle-pw {
      position: absolute; right: 12px; top: 50%;
      transform: translateY(-50%);
      background: none; border: none; cursor: pointer;
      font-size: 16px; color: var(--text-sub); padding: 4px;
    }
    .strength-bar {
      height: 4px; border-radius: 2px;
      background: var(--border); margin-top: 8px; overflow: hidden;
    }
    .strength-fill {
      height: 100%; border-radius: 2px;
      width: 0%; transition: width 0.3s, background 0.3s;
    }
    .strength-label {
      font-size: 11px; color: var(--text-sub); margin-top: 4px;
    }
    .checking {
      text-align: center; padding: 40px 20px; color: var(--text-sub);
    }
    .checking .spinner {
      font-size: 32px; animation: spin 1s linear infinite; display: block; margin-bottom: 12px;
    }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="auth-page">
    <div class="auth-card" id="card">
      <div class="checking">
        <span class="spinner">⟳</span>
        Verifying reset link...
      </div>
    </div>
  </div>

  <script type="module">
    import { supabase } from './supabase.js'

    async function init() {
      // Supabase puts the tokens in the URL hash after redirect
      const hash = window.location.hash
      const params = new URLSearchParams(hash.replace('#', ''))
      const accessToken  = params.get('access_token')
      const refreshToken = params.get('refresh_token')
      const type         = params.get('type')

      if (!accessToken || type !== 'recovery') {
        showError('Invalid or expired reset link. Please request a new one.')
        return
      }

      // Set the session from the tokens
      const { error } = await supabase.auth.setSession({
        access_token: accessToken,
        refresh_token: refreshToken
      })

      if (error) {
        showError('Link expired or invalid: ' + error.message)
        return
      }

      showForm()
    }

    function showError(msg) {
      document.getElementById('card').innerHTML = `
        <div class="logo">ConnectX</div>
        <div class="tagline">Password Reset</div>
        <div class="msg error" style="display:block;margin-top:20px;">❌ ${msg}</div>
        <a href="index.html" class="btn btn-primary" style="display:block;margin-top:16px;text-align:center;text-decoration:none;padding:14px;border-radius:12px;background:var(--violet);color:#fff;font-weight:700;">Back to Login</a>
      `
    }

    function showForm() {
      document.getElementById('card').innerHTML = `
        <div class="logo">ConnectX</div>
        <div class="tagline">Set a new password</div>

        <div class="input-group" style="margin-top:24px;">
          <label>New Password</label>
          <div class="password-wrapper">
            <input type="password" id="newPassword" placeholder="Min 6 characters" autocomplete="new-password" oninput="checkStrength()"/>
            <button class="toggle-pw" type="button" onclick="togglePw('newPassword', this)">👁</button>
          </div>
          <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
          <div class="strength-label" id="strengthLabel"></div>
        </div>

        <div class="input-group">
          <label>Confirm Password</label>
          <div class="password-wrapper">
            <input type="password" id="confirmPassword" placeholder="Repeat new password" autocomplete="new-password"/>
            <button class="toggle-pw" type="button" onclick="togglePw('confirmPassword', this)">👁</button>
          </div>
        </div>

        <button class="btn btn-primary" onclick="resetPassword()" id="resetBtn">Update Password</button>
        <div id="msg" class="msg"></div>
      `
    }

    window.togglePw = function(id, btn) {
      const input = document.getElementById(id)
      if (input.type === 'password') { input.type = 'text'; btn.textContent = '🙈' }
      else { input.type = 'password'; btn.textContent = '👁' }
    }

    window.checkStrength = function() {
      const pw = document.getElementById('newPassword')?.value || ''
      const fill = document.getElementById('strengthFill')
      const label = document.getElementById('strengthLabel')
      if (!fill) return

      let score = 0
      if (pw.length >= 6)  score++
      if (pw.length >= 10) score++
      if (/[A-Z]/.test(pw)) score++
      if (/[0-9]/.test(pw)) score++
      if (/[^A-Za-z0-9]/.test(pw)) score++

      const levels = [
        { pct: '0%',   color: '',                label: '' },
        { pct: '25%',  color: '#FF5252',          label: '🔴 Weak' },
        { pct: '50%',  color: '#FF9800',          label: '🟠 Fair' },
        { pct: '75%',  color: '#FFC107',          label: '🟡 Good' },
        { pct: '100%', color: 'var(--success)',   label: '🟢 Strong' },
      ]
      const lvl = levels[Math.min(score, 4)]
      fill.style.width = lvl.pct
      fill.style.background = lvl.color
      label.textContent = lvl.label
    }

    window.resetPassword = async function() {
      const newPassword     = document.getElementById('newPassword')?.value || ''
      const confirmPassword = document.getElementById('confirmPassword')?.value || ''
      const msg = document.getElementById('msg')
      const btn = document.getElementById('resetBtn')

      msg.className = 'msg'
      msg.textContent = ''

      if (!newPassword || !confirmPassword) {
        msg.className = 'msg error'; msg.textContent = 'Please fill in both fields.'; return
      }
      if (newPassword.length < 6) {
        msg.className = 'msg error'; msg.textContent = 'Password must be at least 6 characters.'; return
      }
      if (newPassword !== confirmPassword) {
        msg.className = 'msg error'; msg.textContent = 'Passwords do not match.'; return
      }

      btn.textContent = 'Updating...'
      btn.disabled = true

      const { error } = await supabase.auth.updateUser({ password: newPassword })

      if (error) {
        msg.className = 'msg error'
        msg.textContent = '❌ ' + error.message
        btn.textContent = 'Update Password'
        btn.disabled = false
      } else {
        msg.className = 'msg success'
        msg.textContent = '✅ Password updated! Redirecting to login...'
        await supabase.auth.signOut()
        setTimeout(() => window.location.href = 'index.html', 2000)
      }
    }

    init()
  </script>
</body>
</html>
