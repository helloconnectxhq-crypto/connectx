<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>ConnectX – Messages</title>
  <link rel="manifest" href="manifest.json"/>
  <meta name="theme-color" content="#6C63FF"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <link rel="stylesheet" href="style.css"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', sans-serif;
    }

    /* ===== NAVBAR ===== */
    .navbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 60px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      z-index: 100;
    }
    .nav-logo {
      font-size: 20px;
      font-weight: 800;
      color: var(--violet);
    }
    .nav-actions { display: flex; gap: 12px; align-items: center; }
    .nav-btn {
      background: var(--violet);
      color: #fff;
      border: none;
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }
    .nav-actions a {
      color: var(--text-sub);
      font-size: 13px;
      font-weight: 600;
      text-decoration: none;
      margin-right: 8px;
    }

    /* ===== MESSAGES LAYOUT ===== */
    .msg-layout {
      padding-top: 60px;
      height: 100vh;
      display: flex;
    }

    /* ===== SIDEBAR ===== */
    .msg-sidebar {
      width: 320px;
      border-right: 1px solid var(--border);
      background: var(--surface);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }
    .sidebar-header {
      padding: 16px;
      border-bottom: 1px solid var(--border);
      font-size: 18px;
      font-weight: 800;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .new-chat-btn {
      background: var(--violet);
      border: none;
      color: #fff;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .sidebar-search {
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
    }
    .sidebar-search input {
      width: 100%;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      padding: 9px 14px;
      font-size: 13px;
      outline: none;
    }
    .sidebar-search input:focus {
      border-color: var(--violet);
    }
    .conversations-list {
      flex: 1;
      overflow-y: auto;
      scrollbar-width: thin;
    }
    .conv-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      cursor: pointer;
      transition: background 0.15s;
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }
    .conv-item:hover {
      background: var(--elevated);
    }
    .conv-item.active {
      background: rgba(108,99,255,0.12);
    }
    .conv-avatar {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      background: linear-gradient(135deg, #6C63FF, #00D4AA);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 700;
      color: #fff;
      flex-shrink: 0;
      overflow: hidden;
    }
    .conv-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .conv-info {
      flex: 1;
      min-width: 0;
    }
    .conv-name {
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 2px;
    }
    .conv-preview {
      font-size: 12px;
      color: var(--text-sub);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 180px;
      display: block;
    }
    .conv-time {
      font-size: 11px;
      color: var(--text-sub);
    }
    .no-conversations {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-sub);
      font-size: 13px;
    }

    /* ===== CHAT AREA ===== */
    .chat-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: var(--bg);
      position: relative;
    }
    .chat-empty {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--text-sub);
      gap: 12px;
    }
    .chat-empty .icon {
      font-size: 56px;
    }
    .chat-empty p {
      font-size: 15px;
    }
    .chat-header {
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .chat-header-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: linear-gradient(135deg, #6C63FF, #00D4AA);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      font-weight: 700;
      color: #fff;
      overflow: hidden;
    }
    .chat-header-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .chat-header-info {
      flex: 1;
    }
    .chat-header-name {
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
    }
    .chat-header-status {
      font-size: 12px;
      color: var(--success);
    }
    .messages-container {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .msg-bubble-wrap {
      display: flex;
      align-items: flex-end;
      gap: 6px;
      max-width: 75%;
    }
    .msg-bubble-wrap.sent {
      align-self: flex-end;
      flex-direction: row-reverse;
    }
    .msg-bubble-wrap.received {
      align-self: flex-start;
    }
    .msg-bubble {
      padding: 10px 14px;
      border-radius: 18px;
      font-size: 14px;
      line-height: 1.5;
      max-width: 100%;
      word-break: break-word;
    }
    .msg-bubble-wrap.sent .msg-bubble {
      background: var(--violet);
      color: #fff;
      border-bottom-right-radius: 4px;
    }
    .msg-bubble-wrap.received .msg-bubble {
      background: var(--surface);
      color: var(--text);
      border-bottom-left-radius: 4px;
      border: 1px solid var(--border);
    }
    .msg-time {
      font-size: 10px;
      color: rgba(255,255,255,0.6);
      margin-top: 4px;
      display: flex;
      align-items: center;
      gap: 3px;
    }
    .msg-bubble-wrap.received .msg-time {
      color: var(--text-sub);
    }
    .chat-input-area {
      padding: 12px 16px;
      border-top: 1px solid var(--border);
      background: var(--surface);
    }
    .chat-input-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .chat-input {
      flex: 1;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 24px;
      color: var(--text);
      font-size: 14px;
      padding: 10px 16px;
      outline: none;
      resize: none;
      max-height: 100px;
      line-height: 1.4;
    }
    .chat-input:focus {
      border-color: var(--violet);
    }
    .send-btn {
      background: var(--violet);
      border: none;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      color: #fff;
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .send-btn:hover {
      background: var(--violet-dark);
    }

    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--elevated);
      color: var(--text);
      padding: 12px 24px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      border: 1px solid var(--border);
      transition: transform 0.3s ease;
      z-index: 9999;
    }
    .toast.show {
      transform: translateX(-50%) translateY(0);
    }

    /* ===== MOBILE RESPONSIVE ===== */
    @media screen and (max-width: 768px) {
      .msg-layout {
        flex-direction: column;
        height: 100vh;
        padding-top: 60px;
      }
      .msg-sidebar {
        width: 100% !important;
        max-height: 40vh;
        border-right: none;
        border-bottom: 1px solid var(--border);
        flex-shrink: 0;
      }
      .chat-area {
        height: 60vh;
        flex: 1;
      }
      .conv-preview {
        max-width: 150px !important;
      }
    }

    @media screen and (max-width: 480px) {
      .conv-preview {
        max-width: 100px !important;
        font-size: 11px;
      }
      .conv-name {
        font-size: 13px;
      }
      .sidebar-header {
        padding: 10px 12px;
        font-size: 15px;
      }
      .chat-header {
        padding: 8px 12px;
      }
      .chat-header-avatar {
        width: 30px;
        height: 30px;
        font-size: 12px;
      }
      .msg-bubble {
        font-size: 13px;
        padding: 8px 12px;
      }
    }
  </style>
</head>
<body>

  <!-- ===== NAVBAR ===== -->
  <nav class="navbar">
    <div class="nav-logo">ConnectX</div>
    <div class="nav-actions">
      <a href="feed.html">🏠 Feed</a>
      <a href="search.html">🔍 Search</a>
      <a href="profile.html">👤 Profile</a>
      <button class="nav-btn" onclick="logout()">Logout</button>
    </div>
  </nav>

  <!-- ===== MESSAGES LAYOUT ===== -->
  <div class="msg-layout">

    <!-- ===== SIDEBAR ===== -->
    <div class="msg-sidebar" id="msgSidebar">
      <div class="sidebar-header">
        💬 Messages
        <button class="new-chat-btn" onclick="openNewChat()">+</button>
      </div>
      <div class="sidebar-search">
        <input type="text" placeholder="🔍 Search conversations..." oninput="filterConversations(this.value)"/>
      </div>
      <div class="conversations-list" id="conversationsList">
        <div class="no-conversations">Loading...</div>
      </div>
    </div>

    <!-- ===== CHAT AREA ===== -->
    <div class="chat-area" id="chatArea">
      <div class="chat-empty" id="chatEmpty">
        <div class="icon">💬</div>
        <p>Select a conversation to start chatting</p>
        <p style="font-size:13px;">or click + to start a new chat</p>
      </div>

      <div class="chat-header" id="chatHeader" style="display:none;">
        <div class="chat-header-avatar" id="chatHeaderAvatar">?</div>
        <div class="chat-header-info">
          <div class="chat-header-name" id="chatHeaderName"></div>
          <div class="chat-header-status">● Online</div>
        </div>
      </div>

      <div class="messages-container" id="messagesContainer" style="display:none;"></div>

      <div class="chat-input-area" id="chatInputArea" style="display:none;">
        <div class="chat-input-row">
          <textarea class="chat-input" id="chatInput" placeholder="Type a message..." rows="1" onkeydown="handleInputKey(event)"></textarea>
          <button class="send-btn" onclick="sendMessage()">➤</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ===== TOAST ===== -->
  <div class="toast" id="toast"></div>

  <script type="module">
    import { supabase } from './supabase.js'

    let currentUser = null
    let currentProfile = null
    let activeChat = null
    let conversations = []
    let realtimeChannel = null

    async function init() {
      const { data: { session } } = await supabase.auth.getSession()
      if (!session) { window.location.href = 'index.html'; return }
      currentUser = session.user

      const { data } = await supabase.from('profiles').select('*').eq('id', currentUser.id).single()
      currentProfile = data

      loadConversations()
    }

    async function loadConversations() {
      const { data: msgs } = await supabase
        .from('messages')
        .select('*, sender:profiles!messages_sender_id_fkey(id,username,avatar_url,full_name), receiver:profiles!messages_receiver_id_fkey(id,username,avatar_url,full_name)')
        .or(`sender_id.eq.${currentUser.id},receiver_id.eq.${currentUser.id}`)
        .order('created_at', { ascending: false })

      if (!msgs || msgs.length === 0) {
        document.getElementById('conversationsList').innerHTML = '<div class="no-conversations">No conversations yet.<br/>Click + to start chatting!</div>'
        return
      }

      const seen = new Set()
      conversations = []
      msgs.forEach(m => {
        const other = m.sender_id === currentUser.id ? m.receiver : m.sender
        if (other && !seen.has(other.id)) { seen.add(other.id); conversations.push({ user: other, lastMsg: m }) }
      })
      renderConversations(conversations)
    }

    function renderConversations(convs) {
      const listEl = document.getElementById('conversationsList')
      if (!convs.length) { listEl.innerHTML = '<div class="no-conversations">No conversations yet.<br/>Click + to start chatting!</div>'; return }
      listEl.innerHTML = convs.map(conv => {
        const u = conv.user
        const msg = conv.lastMsg
        const initial = (u.username || 'U')[0].toUpperCase()
        const avatarHtml = u.avatar_url ? `<img src="${u.avatar_url}" alt="${u.username}"/>` : initial
        const preview = msg.content || '📷 Photo'
        return `
          <div class="conv-item ${activeChat?.id===u.id?'active':''}" onclick="openChat('${u.id}','${u.username}','${u.full_name||u.username}','${u.avatar_url||''}')">
            <div class="conv-avatar">${avatarHtml}</div>
            <div class="conv-info">
              <div class="conv-name">${u.full_name||u.username}</div>
              <div class="conv-preview">${preview}</div>
            </div>
            <div class="conv-time">${formatTime(msg.created_at)}</div>
          </div>`
      }).join('')
    }

    window.filterConversations = function (q) {
      if (!q) { renderConversations(conversations); return }
      renderConversations(conversations.filter(c => c.user.username?.toLowerCase().includes(q.toLowerCase()) || c.user.full_name?.toLowerCase().includes(q.toLowerCase())))
    }

    window.openChat = async function (userId, username, fullName, avatarUrl) {
      activeChat = { id: userId, username, fullName, avatarUrl }
      document.getElementById('chatEmpty').style.display = 'none'
      document.getElementById('chatHeader').style.display = 'flex'
      document.getElementById('messagesContainer').style.display = 'flex'
      document.getElementById('chatInputArea').style.display = 'block'

      const avatarEl = document.getElementById('chatHeaderAvatar')
      avatarEl.innerHTML = avatarUrl ? `<img src="${avatarUrl}" alt="${username}" style="width:100%;height:100%;object-fit:cover;"/>` : (username||'U')[0].toUpperCase()
      document.getElementById('chatHeaderName').textContent = fullName || username

      await supabase.from('messages').update({ read: true }).eq('sender_id', userId).eq('receiver_id', currentUser.id)
      loadMessages()
      subscribeToMessages()
      loadConversations()
    }

    async function loadMessages() {
      if (!activeChat) return
      const container = document.getElementById('messagesContainer')
      container.innerHTML = '<div style="text-align:center;color:var(--text-sub);padding:20px;">Loading...</div>'

      const { data: msgs } = await supabase
        .from('messages')
        .select('*, sender:profiles!messages_sender_id_fkey(username,avatar_url)')
        .or(`and(sender_id.eq.${currentUser.id},receiver_id.eq.${activeChat.id}),and(sender_id.eq.${activeChat.id},receiver_id.eq.${currentUser.id})`)
        .order('created_at', { ascending: true })

      if (!msgs || msgs.length === 0) {
        container.innerHTML = `<div style="text-align:center;color:var(--text-sub);padding:40px 20px;"><div style="font-size:40px;margin-bottom:10px;">👋</div><p>Say hello to @${activeChat.username}!</p></div>`
        return
      }

      container.innerHTML = ''
      msgs.forEach(msg => {
        container.appendChild(createBubble(msg))
      })
      container.scrollTop = container.scrollHeight
    }

    function createBubble(msg) {
      const isSent = msg.sender_id === currentUser.id
      const wrap = document.createElement('div')
      wrap.className = `msg-bubble-wrap ${isSent ? 'sent' : 'received'}`

      const bubble = document.createElement('div')
      bubble.className = 'msg-bubble'
      bubble.innerHTML = `${msg.content||''}<div class="msg-time">${formatChatTime(msg.created_at)}</div>`

      wrap.appendChild(bubble)
      return wrap
    }

    window.sendMessage = async function () {
      const input = document.getElementById('chatInput')
      const content = input.value.trim()
      if (!content || !activeChat) return
      input.value = ''
      const { error } = await supabase.from('messages').insert({ sender_id: currentUser.id, receiver_id: activeChat.id, content, media_type: 'text' })
      if (!error) { loadMessages(); loadConversations(); }
    }

    function subscribeToMessages() {
      if (realtimeChannel) supabase.removeChannel(realtimeChannel)
      realtimeChannel = supabase.channel('messages-' + activeChat.id)
        .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, (payload) => {
          const msg = payload.new
          if ((msg.sender_id===currentUser.id&&msg.receiver_id===activeChat.id)||(msg.sender_id===activeChat.id&&msg.receiver_id===currentUser.id)) {
            const container = document.getElementById('messagesContainer')
            container.appendChild(createBubble(msg))
            container.scrollTop = container.scrollHeight
          }
        }).subscribe()
    }

    window.openNewChat = () => {
      showToast('🔍 Search users feature coming soon!')
    }

    window.handleInputKey = function (e) {
      if (e.key==='Enter'&&!e.shiftKey) {
        e.preventDefault();
        sendMessage()
      }
    }

    window.logout = async function () {
      await supabase.auth.signOut()
      window.location.href = 'index.html'
    }

    function showToast(msg) {
      const t = document.getElementById('toast')
      t.textContent = msg
      t.classList.add('show')
      setTimeout(() => t.classList.remove('show'), 2500)
    }

    function formatTime(dateStr) {
      const diff = Math.floor((Date.now() - new Date(dateStr)) / 1000)
      if (diff < 60) return `${diff}s ago`
      if (diff < 3600) return `${Math.floor(diff/60)}m ago`
      if (diff < 86400) return `${Math.floor(diff/3600)}h ago`
      return `${Math.floor(diff/86400)}d ago`
    }

    function formatChatTime(dateStr) {
      const d = new Date(dateStr)
      return d.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' })
    }

    init()
  </script>

</body>
</html>
